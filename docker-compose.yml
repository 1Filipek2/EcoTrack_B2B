version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: ecotrack-postgres
    environment:
      POSTGRES_DB: EcoTrackDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EcoTrackDb"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ecotrack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: ecotrack-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: EcoTrack.WebApi/Dockerfile
    container_name: ecotrack-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__EcoTrackDatabase: Host=postgres;Port=5432;Database=EcoTrackDb;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      Ai__Provider: ${AI_PROVIDER:-OpenAI}
      Ai__Model: ${AI_MODEL:-gpt-4o-mini}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      AzureOpenAI__Endpoint: ${AZURE_OPENAI_ENDPOINT:-}
      AzureOpenAI__ApiKey: ${AZURE_OPENAI_API_KEY:-}
      AzureOpenAI__DeploymentName: ${AZURE_OPENAI_DEPLOYMENT:-}
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  ollama_data:
